<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復康巴士資源樞紐系統 - Rehabus Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* 自定義捲軸樣式 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // 圖標組件包裝 (因 Lucide 在 React CDN 模式下需特別處理)
        const Icon = ({ name, className }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        setSvg(icon.toSvg({ class: className }));
                    }
                }
            }, [name, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const REGIONS = ['香港島', '九龍東', '九龍西', '新界東', '新界西'];
        const TIME_SLOTS = ['上午繁忙時間 (06:00-10:59)', '中段 (11:00-14:59)', '下午繁忙時間 (15:00-19:59)', '晚上 (20:00-23:59)'];
        const PURPOSES = ['治療', '上班/上學', '訓練', '社交/娛樂', '其他'];

        const generateDefaultQuota = () => {
            const quota = {};
            REGIONS.forEach(region => {
                quota[region] = {};
                TIME_SLOTS.forEach(slot => {
                    quota[region][slot] = {
                        pickup: { total: 12, used: Math.floor(Math.random() * 5) },
                        dropoff: { total: 12, used: Math.floor(Math.random() * 5) }
                    };
                });
            });
            return quota;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('process');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [quotasData, setQuotasData] = useState({});
            const [bookings, setBookings] = useState([]);
            const [alertMsg, setAlertMsg] = useState({ type: '', text: '' });

            const [bookingForm, setBookingForm] = useState({
                applicantName: '',
                purpose: PURPOSES[0],
                pickupRegion: REGIONS[0],
                dropoffRegion: REGIONS[1],
                timeSlot: TIME_SLOTS[0],
            });

            useEffect(() => {
                if (!quotasData[selectedDate]) {
                    setQuotasData(prev => ({
                        ...prev,
                        [selectedDate]: generateDefaultQuota()
                    }));
                }
                setAlertMsg({ type: '', text: '' });
            }, [selectedDate]);

            const currentQuota = quotasData[selectedDate] || generateDefaultQuota();

            const processBooking = () => {
                if (!bookingForm.applicantName.trim()) {
                    setAlertMsg({ type: 'error', text: '請輸入申請者姓名' });
                    return;
                }

                const pickupQuota = currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup;
                const dropoffQuota = currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff;

                if (pickupQuota.used >= pickupQuota.total || dropoffQuota.used >= dropoffQuota.total) {
                    setAlertMsg({ type: 'error', text: '審核不通過：所選時段起訖點配額不足' });
                    return;
                }

                setQuotasData(prev => ({
                    ...prev,
                    [selectedDate]: {
                        ...prev[selectedDate],
                        [bookingForm.pickupRegion]: {
                            ...prev[selectedDate][bookingForm.pickupRegion],
                            [bookingForm.timeSlot]: {
                                ...prev[selectedDate][bookingForm.pickupRegion][bookingForm.timeSlot],
                                pickup: { ...pickupQuota, used: pickupQuota.used + 1 }
                            }
                        },
                        [bookingForm.dropoffRegion]: {
                            ...prev[selectedDate][bookingForm.dropoffRegion],
                            [bookingForm.timeSlot]: {
                                ...prev[selectedDate][bookingForm.dropoffRegion][bookingForm.timeSlot],
                                dropoff: { ...dropoffQuota, used: dropoffQuota.used + 1 }
                            }
                        }
                    }
                }));

                setBookings(prev => [{ ...bookingForm, id: Date.now(), bookingDate: selectedDate }, ...prev]);
                setAlertMsg({ type: 'success', text: '預約成功！' });
                setBookingForm(prev => ({ ...prev, applicantName: '' }));
            };

            const handleQuotaChange = (region, slot, hub, field, value) => {
                const val = parseInt(value) || 0;
                setQuotasData(prev => ({
                    ...prev,
                    [selectedDate]: {
                        ...prev[selectedDate],
                        [region]: {
                            ...prev[selectedDate][region],
                            [slot]: {
                                ...prev[selectedDate][region][slot],
                                [hub]: { ...prev[selectedDate][region][slot][hub], [field]: val }
                            }
                        }
                    }
                }));
            };

            return (
                <div className="min-h-screen">
                    <header className="bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center border-b-4 border-blue-600">
                        <div className="flex items-center space-x-3">
                            <Icon name="Bus" className="w-8 h-8 text-blue-400" />
                            <h1 className="text-xl font-black uppercase tracking-tight">Rehabus Hub | 車務調配系統</h1>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <aside className="space-y-4">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <button onClick={()=>setActiveTab('process')} className={`w-full flex items-center p-4 transition ${activeTab==='process'?'bg-blue-600 text-white':'text-slate-600 hover:bg-slate-50'}`}>
                                    <Icon name="UserPlus" className="w-5 h-5 mr-3" /> <span className="font-bold">新增預約申請</span>
                                </button>
                                <button onClick={()=>setActiveTab('manage')} className={`w-full flex items-center p-4 transition ${activeTab==='manage'?'bg-blue-600 text-white':'text-slate-600 hover:bg-slate-50'}`}>
                                    <Icon name="Settings" className="w-5 h-5 mr-3" /> <span className="font-bold">配額樞紐設定</span>
                                </button>
                            </div>

                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                                <h3 className="text-xs font-black text-slate-400 uppercase mb-3 flex items-center tracking-widest">
                                    <Icon name="List" className="w-4 h-4 mr-2" /> {selectedDate} 預約名單
                                </h3>
                                <div className="space-y-2 max-h-[400px] overflow-y-auto">
                                    {bookings.filter(b => b.bookingDate === selectedDate).length === 0 ? (
                                        <p className="text-[10px] text-center text-slate-400 py-4 italic">尚無預約</p>
                                    ) : (
                                        bookings.filter(b => b.bookingDate === selectedDate).map(b => (
                                            <div key={b.id} className="text-[11px] p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <div className="font-bold text-slate-800">{b.applicantName} ({b.purpose})</div>
                                                <div className="text-slate-500 mt-1">{b.pickupRegion} → {b.dropoffRegion}</div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </aside>

                        <main className="lg:col-span-3">
                            {activeTab === 'process' ? (
                                <div className="grid grid-cols-1 xl:grid-cols-5 gap-6">
                                    <div className="xl:col-span-3 bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-6">
                                        <h2 className="text-lg font-black text-slate-800 flex items-center uppercase tracking-tight">
                                            <Icon name="FileText" className="w-5 h-5 mr-2 text-blue-600" /> 預約資料錄入
                                        </h2>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="text-[11px] font-black text-slate-500 uppercase mb-2 block tracking-wider">乘車日期</label>
                                                <input type="date" value={selectedDate} onChange={(e)=>setSelectedDate(e.target.value)} className="w-full p-3 border rounded-xl bg-slate-50 font-bold" />
                                            </div>
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="text-[11px] font-black text-slate-500 uppercase mb-2 block tracking-wider">申請人姓名</label>
                                                <input type="text" value={bookingForm.applicantName} onChange={(e)=>setBookingForm({...bookingForm, applicantName: e.target.value})} className="w-full p-3 border rounded-xl bg-slate-50" placeholder="姓名" />
                                            </div>
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="text-[11px] font-black text-emerald-600 uppercase mb-2 block tracking-wider">上車區</label>
                                                <select value={bookingForm.pickupRegion} onChange={(e)=>setBookingForm({...bookingForm, pickupRegion: e.target.value})} className="w-full p-3 border border-emerald-200 bg-emerald-50 rounded-xl font-bold">
                                                    {REGIONS.map(r => <option key={r}>{r}</option>)}
                                                </select>
                                            </div>
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="text-[11px] font-black text-orange-600 uppercase mb-2 block tracking-wider">落車區</label>
                                                <select value={bookingForm.dropoffRegion} onChange={(e)=>setBookingForm({...bookingForm, dropoffRegion: e.target.value})} className="w-full p-3 border border-orange-200 bg-orange-50 rounded-xl font-bold">
                                                    {REGIONS.map(r => <option key={r}>{r}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <button onClick={processBooking} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-black transition-all">提交預約</button>
                                        {alertMsg.text && (
                                            <div className={`p-4 rounded-xl text-sm font-bold border ${alertMsg.type==='error'?'bg-red-50 border-red-200 text-red-600':'bg-emerald-50 border-emerald-200 text-emerald-600'}`}>
                                                {alertMsg.text}
                                            </div>
                                        )}
                                    </div>
                                    <div className="xl:col-span-2">
                                        <div className="bg-slate-900 text-white p-6 rounded-3xl shadow-xl">
                                            <h3 className="text-xs font-black text-slate-400 uppercase mb-6 flex items-center tracking-widest border-b border-slate-700 pb-3">即時配額檢測</h3>
                                            <div className="space-y-6">
                                                <div>
                                                    <div className="flex justify-between mb-2">
                                                        <span className="text-xs text-emerald-400 font-bold uppercase">{bookingForm.pickupRegion} (上車)</span>
                                                        <span className="text-xs font-mono">{currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.used} / {currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.total}</span>
                                                    </div>
                                                    <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                                                        <div className="bg-emerald-500 h-full transition-all" style={{width: `${(currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.used / currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.total) * 100}%`}}></div>
                                                    </div>
                                                </div>
                                                <div>
                                                    <div className="flex justify-between mb-2">
                                                        <span className="text-xs text-orange-400 font-bold uppercase">{bookingForm.dropoffRegion} (落車)</span>
                                                        <span className="text-xs font-mono">{currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.used} / {currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.total}</span>
                                                    </div>
                                                    <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                                                        <div className="bg-orange-500 h-full transition-all" style={{width: `${(currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.used / currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.total) * 100}%`}}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 overflow-x-auto">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xl font-black flex items-center"><Icon name="Settings" className="w-6 h-6 mr-2 text-blue-600" /> 配額設定 ({selectedDate})</h2>
                                        <input type="date" value={selectedDate} onChange={(e)=>setSelectedDate(e.target.value)} className="text-xs font-bold bg-blue-50 border-none rounded p-2" />
                                    </div>
                                    <table className="w-full border-collapse min-w-[600px]">
                                        <thead>
                                            <tr className="bg-slate-50 border-b text-[10px] text-slate-400 uppercase">
                                                <th className="p-4 text-left border-r">區域</th>
                                                {TIME_SLOTS.map(s => <th key={s} className="p-4 text-center border-r">{s.split(' ')[0]}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {REGIONS.map(region => (
                                                <tr key={region} className="border-b">
                                                    <td className="p-4 border-r font-bold text-slate-700">{region}</td>
                                                    {TIME_SLOTS.map(slot => (
                                                        <td key={slot} className="p-4 border-r">
                                                            <div className="space-y-2">
                                                                <div className="flex items-center text-[10px]">
                                                                    <span className="w-12 text-emerald-600 font-bold">上車:</span>
                                                                    <input type="number" value={currentQuota[region][slot].pickup.total} onChange={(e)=>handleQuotaChange(region, slot, 'pickup', 'total', e.target.value)} className="w-12 p-1 border rounded text-center" />
                                                                </div>
                                                                <div className="flex items-center text-[10px]">
                                                                    <span className="w-12 text-orange-600 font-bold">落車:</span>
                                                                    <input type="number" value={currentQuota[region][slot].dropoff.total} onChange={(e)=>handleQuotaChange(region, slot, 'dropoff', 'total', e.target.value)} className="w-12 p-1 border rounded text-center" />
                                                                </div>
                                                            </div>
                                                        </td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
