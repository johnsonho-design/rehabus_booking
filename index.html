<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復康巴士資源樞紐系統 - 時段資源概覽</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const manualConfig = {
            apiKey: "AIzaSyDyq0hFze7k8lGOM74DrEUHd2lMuiRLfKE",
            authDomain: "rehabus-hub.firebaseapp.com",
            projectId: "rehabus-hub",
            storageBucket: "rehabus-hub.firebasestorage.app",
            messagingSenderId: "177803133313",
            appId: "1:177803133313:web:f7f660932ebfc070142880"
        };

        let firebaseConfig = null;
        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            } else if (manualConfig.apiKey !== "YOUR_API_KEY") {
                firebaseConfig = manualConfig;
            }
        } catch (e) { console.error("Config error", e); }

        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'rehabus-hub-global';
            window.FB_SERVICES = { db, auth, appId, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, signInAnonymously, onAuthStateChanged, signInWithCustomToken, isDemo: false };
        } else {
            window.FB_SERVICES = { isDemo: true, onAuthStateChanged: (auth, callback) => callback({ uid: 'OFFLINE-' + Math.random().toString(36).substr(2, 5) }) };
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    if (className) iconElement.className = className;
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({ attrs: { class: className } });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const REGIONS = ['香港島', '九龍東', '九龍西', '新界東', '新界西'];
        const TIME_SLOTS = ['上午繁忙時間 (06:00-10:59)', '中段 (11:00-14:59)', '下午繁忙時間 (15:00-19:59)', '晚上 (20:00-23:59)'];
        const PURPOSES = ['就診/治療', '上班/上學', '康復訓練', '社交/娛樂', '日常購物', '其他'];

        const generateDefaultQuota = () => {
            const quota = {};
            REGIONS.forEach(region => {
                quota[region] = {};
                TIME_SLOTS.forEach(slot => {
                    quota[region][slot] = { pickup: { total: 15, used: Math.floor(Math.random()*5) }, dropoff: { total: 15, used: Math.floor(Math.random()*5) } };
                });
            });
            return quota;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('manage');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [quotasData, setQuotasData] = useState({});
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const services = window.FB_SERVICES;
                if (!services || services.isDemo) {
                    setUser({ uid: 'DEMO-MODE' });
                    setQuotasData({ [selectedDate]: generateDefaultQuota() });
                    setLoading(false);
                    return;
                }
                const { auth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = services;
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { await signInAnonymously(auth); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || window.FB_SERVICES?.isDemo) return;
                const { db, appId, doc, onSnapshot, setDoc } = window.FB_SERVICES;
                const quotaDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'quotas', selectedDate);
                return onSnapshot(quotaDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setQuotasData(prev => ({ ...prev, [selectedDate]: docSnap.data() }));
                    } else {
                        const defaultData = generateDefaultQuota();
                        setDoc(quotaDocRef, defaultData);
                        setQuotasData(prev => ({ ...prev, [selectedDate]: defaultData }));
                    }
                    setLoading(false);
                });
            }, [user, selectedDate]);

            const currentQuota = quotasData[selectedDate] || generateDefaultQuota();

            const handleQuotaChange = async (region, slot, hub, field, value) => {
                if (!user || window.FB_SERVICES.isDemo) return;
                const { db, appId, doc, setDoc } = window.FB_SERVICES;
                const val = parseInt(value) || 0;
                const updatedQuota = JSON.parse(JSON.stringify(currentQuota));
                updatedQuota[region][slot][hub][field] = val;
                const quotaDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'quotas', selectedDate);
                await setDoc(quotaDocRef, updatedQuota);
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-slate-900 text-white p-5 flex justify-between items-center shadow-lg border-b-4 border-indigo-500">
                        <div className="flex items-center space-x-3">
                            <div className="p-2 bg-indigo-500 rounded-lg"><Icon name="layout-dashboard" className="w-6 h-6 text-white" /></div>
                            <h1 className="text-xl font-black tracking-tight">REHABUS <span className="text-indigo-400">QUOTA</span> HUB</h1>
                        </div>
                        <div className="flex items-center space-x-4">
                            <input type="date" value={selectedDate} onChange={(e)=>setSelectedDate(e.target.value)} className="bg-slate-800 border-none rounded-lg text-sm px-3 py-2 font-bold focus:ring-2 focus:ring-indigo-500" />
                            <div className="hidden md:block text-[10px] text-slate-400 font-mono bg-slate-800 px-3 py-2 rounded-lg border border-slate-700">USER: {user?.uid.slice(0,8)}...</div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-4 mt-8 space-y-8">
                        {/* 配額輸入表格 */}
                        <section className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                <h2 className="text-lg font-black text-slate-800 flex items-center">
                                    <Icon name="edit-3" className="w-5 h-5 mr-2 text-indigo-600" /> 配額資源配置表
                                </h2>
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">區域 x 時段 矩陣管理</span>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full border-collapse">
                                    <thead>
                                        <tr className="bg-white border-b text-[11px] text-slate-400 uppercase font-black">
                                            <th className="p-4 text-left border-r bg-white sticky left-0 z-10 w-32 shadow-[2px_0_5px_rgba(0,0,0,0.05)]">區域 / 時段</th>
                                            {TIME_SLOTS.map(s => <th key={s} className="p-4 text-center border-r min-w-[160px]">{s.split(' ')[0]}</th>)}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {REGIONS.map(region => (
                                            <tr key={region} className="border-b hover:bg-slate-50 transition-colors">
                                                <td className="p-4 border-r font-black text-slate-700 bg-white sticky left-0 z-10 shadow-[2px_0_5px_rgba(0,0,0,0.02)]">{region}</td>
                                                {TIME_SLOTS.map(slot => (
                                                    <td key={slot} className="p-4 border-r">
                                                        <div className="grid grid-cols-2 gap-2">
                                                            <div>
                                                                <span className="text-[9px] font-black text-emerald-600 mb-1 block">上車</span>
                                                                <input type="number" value={currentQuota[region][slot].pickup.total} onChange={(e)=>handleQuotaChange(region, slot, 'pickup', 'total', e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-xs text-center font-bold focus:ring-2 focus:ring-emerald-500 outline-none" />
                                                            </div>
                                                            <div>
                                                                <span className="text-[9px] font-black text-orange-600 mb-1 block">落車</span>
                                                                <input type="number" value={currentQuota[region][slot].dropoff.total} onChange={(e)=>handleQuotaChange(region, slot, 'dropoff', 'total', e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg text-xs text-center font-bold focus:ring-2 focus:ring-orange-500 outline-none" />
                                                            </div>
                                                        </div>
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </section>

                        {/* 時段分類概覽面板 */}
                        <section className="bg-slate-900 rounded-[2.5rem] shadow-2xl p-8 border border-slate-800">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 space-y-4 md:space-y-0 border-b border-slate-800 pb-6">
                                <div>
                                    <h2 className="text-white text-2xl font-black tracking-tight flex items-center">
                                        <Icon name="bar-chart-horizontal" className="w-7 h-7 mr-3 text-indigo-400" /> 全港配額時段分佈
                                    </h2>
                                    <p className="text-slate-500 text-xs mt-1 font-medium italic">依據不同時段分析各區運力負荷百分比</p>
                                </div>
                                <div className="flex bg-slate-800 p-1.5 rounded-xl space-x-2 border border-slate-700">
                                    <div className="flex items-center px-3 py-1 bg-emerald-500/10 rounded-lg"><div className="w-2.5 h-2.5 bg-emerald-500 rounded-full mr-2"></div><span className="text-[10px] text-emerald-400 font-bold">上車</span></div>
                                    <div className="flex items-center px-3 py-1 bg-orange-500/10 rounded-lg"><div className="w-2.5 h-2.5 bg-orange-500 rounded-full mr-2"></div><span className="text-[10px] text-orange-400 font-bold">落車</span></div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                {TIME_SLOTS.map(slot => (
                                    <div key={slot} className="bg-slate-800/50 rounded-3xl p-6 border border-slate-700/50 hover:bg-slate-800 transition-all duration-300">
                                        <div className="flex items-center justify-between mb-6">
                                            <div className="flex items-center">
                                                <div className="w-10 h-10 bg-indigo-500/20 rounded-xl flex items-center justify-center mr-3 border border-indigo-500/30">
                                                    <Icon name={slot.includes('繁忙') ? 'zap' : 'clock'} className="w-5 h-5 text-indigo-400" />
                                                </div>
                                                <span className="text-white font-black text-lg">{slot.split(' ')[0]}</span>
                                            </div>
                                            <span className="text-[10px] font-mono text-slate-500 bg-slate-900 px-3 py-1 rounded-full border border-slate-700">{slot.split(' ')[1]}</span>
                                        </div>

                                        <div className="space-y-5">
                                            {REGIONS.map(region => {
                                                const pUsed = currentQuota[region][slot].pickup.used;
                                                const pTotal = currentQuota[region][slot].pickup.total;
                                                const pPct = (pUsed / pTotal) * 100 || 0;

                                                const dUsed = currentQuota[region][slot].dropoff.used;
                                                const dTotal = currentQuota[region][slot].dropoff.total;
                                                const dPct = (dUsed / dTotal) * 100 || 0;

                                                return (
                                                    <div key={region} className="group">
                                                        <div className="flex justify-between items-end mb-2">
                                                            <span className="text-slate-300 font-bold text-xs group-hover:text-indigo-400 transition-colors">{region}</span>
                                                            <div className="flex space-x-3 text-[9px] font-mono">
                                                                <span className="text-emerald-500">P: {pUsed}/{pTotal}</span>
                                                                <span className="text-orange-500">D: {dUsed}/{dTotal}</span>
                                                            </div>
                                                        </div>
                                                        
                                                        {/* 雙層進度條設計 */}
                                                        <div className="space-y-1.5">
                                                            <div className="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden border border-slate-800">
                                                                <div 
                                                                    className={`h-full transition-all duration-1000 ${pPct > 80 ? 'bg-red-500' : 'bg-emerald-500'}`} 
                                                                    style={{width: `${pPct}%`}}
                                                                ></div>
                                                            </div>
                                                            <div className="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden border border-slate-800">
                                                                <div 
                                                                    className={`h-full transition-all duration-1000 ${dPct > 80 ? 'bg-red-500' : 'bg-orange-500'}`} 
                                                                    style={{width: `${dPct}%`}}
                                                                ></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6 pt-8 border-t border-slate-800">
                                <div className="bg-slate-800/30 p-4 rounded-2xl flex items-center border border-slate-700/50">
                                    <div className="w-3 h-3 bg-red-500 rounded-full mr-3 shadow-[0_0_10px_rgba(239,68,68,0.5)] animate-pulse"></div>
                                    <span className="text-[11px] text-slate-400 font-bold uppercase tracking-widest">紅色：區域負荷超過 80%</span>
                                </div>
                                <div className="bg-slate-800/30 p-4 rounded-2xl flex items-center border border-slate-700/50">
                                    <Icon name="info" className="w-4 h-4 text-slate-500 mr-3" />
                                    <span className="text-[11px] text-slate-400 font-medium">數據每 5 秒與雲端同步一次</span>
                                </div>
                                <div className="bg-indigo-500/10 p-4 rounded-2xl flex items-center border border-indigo-500/20">
                                    <Icon name="shield-check" className="w-4 h-4 text-indigo-400 mr-3" />
                                    <span className="text-[11px] text-indigo-400 font-black">調度決策支援模式已啟動</span>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
