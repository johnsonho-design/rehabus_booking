<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復康巴士資源樞紐系統 - Rehabus Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .quota-input::-webkit-inner-spin-button, .quota-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'rehabus-hub-v1';

        window.FB_SERVICES = { 
            db, auth, appId, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, 
            signInAnonymously, onAuthStateChanged, signInWithCustomToken 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const REGIONS = ['香港島', '九龍東', '九龍西', '新界東', '新界西'];
        const TIME_SLOTS = ['上午繁忙時間 (06:00-10:59)', '中段 (11:00-14:59)', '下午繁忙時間 (15:00-19:59)', '晚上 (20:00-23:59)'];
        const PURPOSES = ['就診/治療', '上班/上學', '訓練', '社交/娛樂', '其他'];
        
        const DAY_TYPES = {
            WEEKDAY: { label: '平日 (一至五)', color: 'bg-blue-500', text: 'text-blue-600' },
            SATURDAY: { label: '星期六', color: 'bg-orange-500', text: 'text-orange-600' },
            HOLIDAY: { label: '星期日及公眾假期', color: 'bg-rose-500', text: 'text-rose-600' }
        };

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons();
                }
            }, [name]);
            return <span ref={iconRef} className={className} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        const generateDefaultQuota = (val = 10) => {
            const q = {};
            REGIONS.forEach(r => {
                q[r] = {};
                TIME_SLOTS.forEach(s => {
                    q[r][s] = { pickup: { total: val, used: 0 }, dropoff: { total: val, used: 0 } };
                });
            });
            return q;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState('cs');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [editMode, setEditMode] = useState('WEEKDAY');
            const [quotasData, setQuotasData] = useState({});
            const [templates, setTemplates] = useState({});
            const [bookings, setBookings] = useState([]);
            const [status, setStatus] = useState({ msg: '', type: '' });

            const [formData, setFormData] = useState({
                applicantName: '', purpose: PURPOSES[0], pickupRegion: REGIONS[0],
                dropoffRegion: REGIONS[1], timeSlot: TIME_SLOTS[0], tripCount: 1
            });

            const getDayType = (dateStr) => {
                const day = new Date(dateStr).getDay();
                if (day === 0) return 'HOLIDAY';
                if (day === 6) return 'SATURDAY';
                return 'WEEKDAY';
            };

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.FB_SERVICES) {
                        clearInterval(checkFB);
                        const fb = window.FB_SERVICES;
                        const initAuth = async () => {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await fb.signInWithCustomToken(fb.auth, __initial_auth_token);
                            } else {
                                await fb.signInAnonymously(fb.auth);
                            }
                        };
                        initAuth();
                        fb.onAuthStateChanged(fb.auth, setUser);
                    }
                }, 100);
            }, []);

            useEffect(() => {
                if (!user) return;
                const fb = window.FB_SERVICES;
                const qBookings = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'bookings');
                const unsubBookings = fb.onSnapshot(qBookings, (snap) => {
                    setBookings(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const qTemplates = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'quotaTemplates');
                const unsubTemplates = fb.onSnapshot(qTemplates, (snap) => {
                    const t = {}; snap.docs.forEach(d => t[d.id] = d.data());
                    setTemplates(t);
                });
                const qQuotas = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'dailyQuotas');
                const unsubQuotas = fb.onSnapshot(qQuotas, (snap) => {
                    const q = {}; snap.docs.forEach(d => q[d.id] = d.data());
                    setQuotasData(q);
                });
                return () => { unsubBookings(); unsubTemplates(); unsubQuotas(); };
            }, [user]);

            const currentActiveQuota = useMemo(() => {
                if (role === 'ops') {
                    if (editMode === 'date') return quotasData[selectedDate] || templates[getDayType(selectedDate)] || generateDefaultQuota(15);
                    return templates[editMode] || generateDefaultQuota(15);
                }
                return quotasData[selectedDate] || templates[getDayType(selectedDate)] || generateDefaultQuota(10);
            }, [role, editMode, quotasData, selectedDate, templates]);

            const showStatus = (msg, type = 'success') => {
                setStatus({ msg, type });
                setTimeout(() => setStatus({ msg: '', type: '' }), 3000);
            };

            const handleUpdateQuota = async (region, slot, type, field, value) => {
                if (!user) return;
                const fb = window.FB_SERVICES;
                const updated = JSON.parse(JSON.stringify(currentActiveQuota));
                updated[region][slot][type][field] = parseInt(value) || 0;
                try {
                    const targetCollection = editMode === 'date' ? 'dailyQuotas' : 'quotaTemplates';
                    const targetId = editMode === 'date' ? selectedDate : editMode;
                    await fb.setDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', targetCollection, targetId), updated);
                    showStatus('配額更新成功');
                } catch (e) { showStatus('更新失敗', 'error'); }
            };

            const handleBooking = async () => {
                if (!formData.applicantName.trim()) return showStatus('請輸入乘客姓名', 'error');
                if (!user) return;
                const fb = window.FB_SERVICES;
                const trips = parseInt(formData.tripCount);
                const updated = JSON.parse(JSON.stringify(currentActiveQuota));
                const p = updated[formData.pickupRegion][formData.timeSlot].pickup;
                const d = updated[formData.dropoffRegion][formData.timeSlot].dropoff;

                if (p.used + trips > p.total || d.used + trips > d.total) return showStatus('該時段配額不足', 'error');

                try {
                    p.used += trips;
                    d.used += trips;
                    await fb.setDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'dailyQuotas', selectedDate), updated);
                    await fb.addDoc(fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'bookings'), {
                        ...formData, bookingDate: selectedDate, createdAt: Date.now()
                    });
                    setFormData(prev => ({ ...prev, applicantName: '' }));
                    showStatus('預約申請已提交');
                } catch (e) { showStatus('提交失敗', 'error'); }
            };

            return (
                <div className="flex flex-col h-screen">
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0 sticky top-0 z-50">
                        <div className="flex items-center space-x-3">
                            <div className="bg-blue-600 p-2 rounded-lg text-white">
                                <Icon name="bus" className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight">Rehabus Hub</h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">復康巴士資源樞紐系統</p>
                            </div>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl shadow-inner">
                            <button onClick={() => setRole('cs')} className={`px-5 py-2 rounded-lg text-xs font-black transition-all ${role === 'cs' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>顧客服務部 (CS)</button>
                            <button onClick={() => setRole('ops')} className={`px-5 py-2 rounded-lg text-xs font-black transition-all ${role === 'ops' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>車務管理部 (Ops)</button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar */}
                        <aside className="w-30 md:w-72 bg-white border-r border-slate-200 hidden md:flex flex-col">
                            <div className="p-6 border-b border-slate-100">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">營運日期選擇</label>
                                <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" />
                                <div className={`mt-3 flex items-center p-2 rounded-lg ${DAY_TYPES[getDayType(selectedDate)].color} bg-opacity-10`}>
                                    <span className={`text-[10px] font-black ${DAY_TYPES[getDayType(selectedDate)].text}`}>今日：{DAY_TYPES[getDayType(selectedDate)].label}</span>
                                </div>
                            </div>
                            
                            {/* Booking List Scroll Area */}
                            <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">當日預約名單</h3>
                                {bookings.filter(b => b.bookingDate === selectedDate).length === 0 ? (
                                    <div className="text-center py-8">
                                        <Icon name="inbox" className="w-8 h-8 text-slate-200 mx-auto mb-2" />
                                        <p className="text-xs font-bold text-slate-400 tracking-tight">目前暫無預約</p>
                                    </div>
                                ) : (
                                    bookings.filter(b => b.bookingDate === selectedDate).map(b => (
                                        <div key={b.id} className="bg-slate-50 p-3 rounded-xl border border-slate-100 group hover:border-blue-200 transition-all cursor-default">
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="font-black text-slate-800 text-xs">{b.applicantName}</span>
                                                <span className="bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded text-[8px] font-black uppercase">{b.tripCount} 程</span>
                                            </div>
                                            <div className="flex items-center text-[10px] text-slate-500 font-medium">
                                                <Icon name="map-pin" className="w-2.5 h-2.5 mr-1" />
                                                <span className="truncate">{b.pickupRegion} → {b.dropoffRegion}</span>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            {/* Current Quota Stats Box (Moved here from main content) */}
                            {role === 'cs' && (
                                <div className="p-4 border-t border-slate-100 bg-slate-50/50">
                                    <div className="bg-slate-900 rounded-2xl p-5 text-white shadow-lg relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-20 h-20 bg-blue-600 rounded-full blur-[50px] opacity-20"></div>
                                        <h3 className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center border-b border-slate-800 pb-2">
                                            <Icon name="activity" className="w-2.5 h-2.5 mr-2" /> 當前時段配額
                                        </h3>
                                        <div className="space-y-4">
                                            {[
                                                { reg: formData.pickupRegion, type: 'pickup', label: '出發 (P)', color: 'bg-emerald-500' },
                                                { reg: formData.dropoffRegion, type: 'dropoff', label: '到達 (D)', color: 'bg-rose-500' }
                                            ].map(item => {
                                                const d = currentActiveQuota[item.reg][formData.timeSlot][item.type];
                                                const perc = (d.used / d.total) * 100;
                                                return (
                                                    <div key={item.type} className="space-y-1.5">
                                                        <div className="flex justify-between items-center">
                                                            <div className="flex flex-col">
                                                                <span className="text-[8px] font-black text-slate-500 uppercase">{item.label}</span>
                                                                <span className="text-[10px] font-bold text-white truncate max-w-[80px]">{item.reg}</span>
                                                            </div>
                                                            <span className="text-xs font-black">{d.used} / {d.total}</span>
                                                        </div>
                                                        <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                                            <div className={`h-full ${item.color} transition-all duration-700 ease-out`} style={{width: `${Math.min(100, perc)}%`}}></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </aside>

                        {/* Main Content */}
                        <main className="flex-1 overflow-y-auto p-4 md:p-8 relative">
                            <div className="max-w-6xl mx-auto space-y-8 animate-fadeIn">
                                {status.msg && (
                                    <div className={`fixed bottom-6 right-6 p-4 rounded-2xl shadow-xl flex items-center space-x-3 z-50 ${status.type === 'error' ? 'bg-rose-600 text-white' : 'bg-slate-900 text-white'}`}>
                                        <Icon name={status.type === 'error' ? 'alert-circle' : 'check-circle'} className="w-5 h-5" />
                                        <span className="font-black text-sm tracking-tight">{status.msg}</span>
                                    </div>
                                )}

                                {role === 'cs' ? (
                                    <>
                                        {/* 預約表單 */}
                                        <div className="bg-white p-6 md:p-10 rounded-[2rem] shadow-sm border border-slate-200">
                                            <div className="flex items-center space-x-3 mb-8">
                                                <div className="bg-blue-50 p-3 rounded-2xl text-blue-600">
                                                    <Icon name="calendar-plus" className="w-6 h-6" />
                                                </div>
                                                <h2 className="text-xl font-black text-slate-800 tracking-tight">建立新預約申請</h2>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                                <div className="space-y-2">
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">乘客姓名</label>
                                                    <input type="text" placeholder="請輸入姓名" value={formData.applicantName} onChange={e => setFormData({...formData, applicantName: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 font-bold outline-none focus:bg-white focus:border-blue-600 transition-all" />
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">預約用途</label>
                                                    <select value={formData.purpose} onChange={e => setFormData({...formData, purpose: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 font-bold outline-none cursor-pointer">
                                                        {PURPOSES.map(p => <option key={p}>{p}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">使用時段</label>
                                                    <select value={formData.timeSlot} onChange={e => setFormData({...formData, timeSlot: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 font-bold outline-none cursor-pointer">
                                                        {TIME_SLOTS.map(s => <option key={s}>{s}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">出發分區</label>
                                                    <select value={formData.pickupRegion} onChange={e => setFormData({...formData, pickupRegion: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 font-bold outline-none cursor-pointer">
                                                        {REGIONS.map(r => <option key={r}>{r}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">目的地分區</label>
                                                    <select value={formData.dropoffRegion} onChange={e => setFormData({...formData, dropoffRegion: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 font-bold outline-none cursor-pointer">
                                                        {REGIONS.map(r => <option key={r}>{r}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-2 flex items-end">
                                                    <button onClick={handleBooking} className="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-base hover:bg-blue-600 transition-all shadow-lg active:scale-[0.98]">確認提交預約</button>
                                                </div>
                                            </div>
                                        </div>

                                        {/* 配額概覽表格 */}
                                        <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-200">
                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-100 pb-4 mb-6">
                                                <h3 className="text-lg font-black text-slate-800 flex items-center tracking-tight">
                                                    <Icon name="layout-grid" className="w-5 h-5 mr-2 text-blue-600" /> 全日分區配額一覽 ({selectedDate})
                                                </h3>
                                                <div className="flex space-x-4 mt-2 md:mt-0">
                                                    <div className="flex items-center text-[10px] font-bold text-slate-400">
                                                        <span className="w-2.5 h-2.5 bg-emerald-500 rounded-full mr-1.5"></span> 上車 (P)
                                                    </div>
                                                    <div className="flex items-center text-[10px] font-bold text-slate-400">
                                                        <span className="w-2.5 h-2.5 bg-rose-500 rounded-full mr-1.5"></span> 落車 (D)
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="overflow-x-auto rounded-2xl border border-slate-50">
                                                <table className="w-full text-left">
                                                    <thead className="bg-slate-50">
                                                        <tr>
                                                            <th className="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest sticky left-0 bg-slate-50 z-10">分區</th>
                                                            {TIME_SLOTS.map(s => <th key={s} className="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center min-w-[140px]">{s.split(' ')[0]}</th>)}
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {REGIONS.map(region => (
                                                            <tr key={region} className="border-b border-slate-50 group hover:bg-slate-50/50 transition-all">
                                                                <td className="p-4 font-black text-slate-700 bg-white sticky left-0 z-10 border-r border-slate-50">{region}</td>
                                                                {TIME_SLOTS.map(slot => {
                                                                    const d = currentActiveQuota[region][slot];
                                                                    return (
                                                                        <td key={slot} className="p-4 text-center">
                                                                            <div className="inline-flex space-x-3 bg-white p-1.5 rounded-lg border border-slate-100 shadow-sm group-hover:border-blue-100 transition-all">
                                                                                <div className="text-center">
                                                                                    <p className={`text-xs font-black ${d.pickup.used >= d.pickup.total ? 'text-rose-600' : 'text-emerald-600'}`}>{d.pickup.used}/{d.pickup.total}</p>
                                                                                </div>
                                                                                <div className="w-[1px] bg-slate-100"></div>
                                                                                <div className="text-center">
                                                                                    <p className={`text-xs font-black ${d.dropoff.used >= d.dropoff.total ? 'text-rose-600' : 'text-slate-700'}`}>{d.dropoff.used}/{d.dropoff.total}</p>
                                                                                </div>
                                                                            </div>
                                                                        </td>
                                                                    );
                                                                })}
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    /* Ops 管理介面 */
                                    <div className="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-sm border border-slate-200">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10 border-b border-slate-50 pb-8">
                                            <div>
                                                <h2 className="text-2xl font-black text-slate-800 flex items-center tracking-tight">
                                                    <Icon name="sliders" className="w-7 h-7 mr-3 text-blue-600" /> 配額系統配置管理
                                                </h2>
                                                <p className="text-xs font-bold text-slate-400 mt-1">管理各營運時段之基礎及特定日配額</p>
                                            </div>
                                            <div className="flex bg-slate-100 p-1.5 rounded-2xl shadow-inner">
                                                {Object.keys(DAY_TYPES).map(key => (
                                                    <button key={key} onClick={() => setEditMode(key)} className={`px-5 py-2.5 rounded-xl text-xs font-black transition-all ${editMode === key ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500 hover:text-slate-700'}`}>
                                                        {DAY_TYPES[key].label}
                                                    </button>
                                                ))}
                                                <button onClick={() => setEditMode('date')} className={`px-5 py-2.5 rounded-xl text-xs font-black transition-all ${editMode === 'date' ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500 hover:text-slate-700'}`}>單日微調 ({selectedDate})</button>
                                            </div>
                                        </div>

                                        <div className="overflow-x-auto rounded-[1.5rem] border border-slate-100 shadow-sm">
                                            <table className="w-full text-left">
                                                <thead className="bg-slate-50/80 backdrop-blur-sm sticky top-0 z-20">
                                                    <tr>
                                                        <th className="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest sticky left-0 bg-slate-50 z-30">分區</th>
                                                        {TIME_SLOTS.map(s => <th key={s} className="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center min-w-[200px]">{s}</th>)}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {REGIONS.map(region => (
                                                        <tr key={region} className="border-b border-slate-50 hover:bg-slate-50/30">
                                                            <td className="p-6 font-black text-slate-700 bg-white sticky left-0 z-10 border-r border-slate-50">{region}</td>
                                                            {TIME_SLOTS.map(slot => {
                                                                const d = currentActiveQuota[region][slot];
                                                                return (
                                                                    <td key={slot} className="p-6">
                                                                        <div className="space-y-3">
                                                                            <div className="relative">
                                                                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[9px] font-black text-emerald-600">P</span>
                                                                                <input type="number" value={d.pickup.total} onChange={e => handleUpdateQuota(region, slot, 'pickup', 'total', e.target.value)} className="quota-input w-full bg-emerald-50/50 border border-emerald-100 pl-7 pr-3 py-2 rounded-xl text-xs font-black text-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500/20" />
                                                                            </div>
                                                                            <div className="relative">
                                                                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[9px] font-black text-rose-600">D</span>
                                                                                <input type="number" value={d.dropoff.total} onChange={e => handleUpdateQuota(region, slot, 'dropoff', 'total', e.target.value)} className="quota-input w-full bg-rose-50/50 border border-rose-100 pl-7 pr-3 py-2 rounded-xl text-xs font-black text-rose-700 focus:outline-none focus:ring-2 focus:ring-rose-500/20" />
                                                                            </div>
                                                                        </div>
                                                                    </td>
                                                                );
                                                            })}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
