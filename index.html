<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復康巴士資源樞紐系統 - Rehabus Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === FIREBASE 配置區塊 ===
        const manualConfig = {
            apiKey: "AIzaSyDyq0hFze7k8lGOM74DrEUHd2lMuiRLfKE",
            authDomain: "rehabus-hub.firebaseapp.com",
            projectId: "rehabus-hub",
            storageBucket: "rehabus-hub.firebasestorage.app",
            messagingSenderId: "177803133313",
            appId: "1:177803133313:web:f7f660932ebfc070142880"
        };

        let firebaseConfig = null;
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = JSON.parse(__firebase_config);
            } else if (manualConfig.apiKey && manualConfig.apiKey !== "YOUR_API_KEY") {
                firebaseConfig = manualConfig;
            }
        } catch (e) {
            console.error("Config parsing error", e);
        }

        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'rehabus-hub-global';

            window.FB_SERVICES = { 
                db, auth, appId, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, 
                signInAnonymously, onAuthStateChanged, signInWithCustomToken,
                isDemo: false
            };
        } else {
            window.FB_SERVICES = { 
                isDemo: true,
                onAuthStateChanged: (auth, callback) => {
                    const fakeUser = { uid: 'OFFLINE-USER-' + Math.random().toString(36).substr(2, 9) };
                    setTimeout(() => callback(fakeUser), 100);
                    return () => {};
                }
            };
        }
    </script>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        // Lucide 圖標封裝組件
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    if (className) iconElement.className = className;
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({ attrs: { class: className } });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const REGIONS = ['香港島', '九龍東', '九龍西', '新界東', '新界西'];
        const TIME_SLOTS = ['上午繁忙時間 (06:00-10:59)', '中段 (11:00-14:59)', '下午繁忙時間 (15:00-19:59)', '晚上 (20:00-23:59)'];
        const PURPOSES = ['就診/治療', '上班/上學', '訓練', '社交/娛樂', '其他'];

        const generateDefaultQuota = () => {
            const quota = {};
            REGIONS.forEach(region => {
                quota[region] = {};
                TIME_SLOTS.forEach(slot => {
                    quota[region][slot] = {
                        pickup: { total: 12, used: 0 },
                        dropoff: { total: 12, used: 0 }
                    };
                });
            });
            return quota;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState('cs'); // 'cs' (顧客服務部) 或 'ops' (車務部)
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [quotasData, setQuotasData] = useState({});
            const [bookings, setBookings] = useState([]);
            const [alertMsg, setAlertMsg] = useState({ type: '', text: '' });
            const [loading, setLoading] = useState(true);
            const [isEditingQuota, setIsEditingQuota] = useState(false); // 新增：控制配額是否允許編輯的狀態

            const [bookingForm, setBookingForm] = useState({
                applicantName: '',
                purpose: PURPOSES[0],
                pickupRegion: REGIONS[0],
                dropoffRegion: REGIONS[1],
                timeSlot: TIME_SLOTS[0],
                tripCount: 1, // 新增：申請行程數目
            });

            // 處理 Firebase 認證
            useEffect(() => {
                const checkServices = setInterval(() => {
                    if (window.FB_SERVICES) {
                        clearInterval(checkServices);
                        const services = window.FB_SERVICES;

                        if (services.isDemo) {
                            setUser({ uid: 'DEMO-MODE' });
                            setQuotasData({ [selectedDate]: generateDefaultQuota() });
                            setLoading(false);
                            return;
                        }

                        const { auth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = services;
                        
                        const initAuth = async () => {
                            try {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await signInWithCustomToken(auth, __initial_auth_token);
                                } else {
                                    await signInAnonymously(auth);
                                }
                            } catch (err) { console.error("Auth error:", err); }
                        };

                        initAuth();
                        const unsubscribe = onAuthStateChanged(auth, (u) => setUser(u));
                        return () => unsubscribe();
                    }
                }, 100);
                return () => clearInterval(checkServices);
            }, []);

            // 數據實時同步
            useEffect(() => {
                if (!user || window.FB_SERVICES?.isDemo) return;
                const { db, appId, collection, doc, onSnapshot, setDoc } = window.FB_SERVICES;

                const bookingsCol = collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
                const unsubBookings = onSnapshot(bookingsCol, (snapshot) => {
                    const list = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                    setBookings(list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
                }, (err) => console.error("Bookings load error:", err));

                const quotaDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'quotas', selectedDate);
                const unsubQuotas = onSnapshot(quotaDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setQuotasData(prev => ({ ...prev, [selectedDate]: docSnap.data() }));
                    } else {
                        const defaultData = generateDefaultQuota();
                        setDoc(quotaDocRef, defaultData);
                        setQuotasData(prev => ({ ...prev, [selectedDate]: defaultData }));
                    }
                    setLoading(false);
                }, (err) => {
                    console.error("Quota load error:", err);
                    setLoading(false);
                });

                return () => { unsubBookings(); unsubQuotas(); };
            }, [user, selectedDate]);

            const currentQuota = useMemo(() => {
                return quotasData[selectedDate] || generateDefaultQuota();
            }, [quotasData, selectedDate]);

            // 顧客服務部：提交預約
            const processBooking = async () => {
                if (!user) return;
                if (!bookingForm.applicantName.trim()) {
                    setAlertMsg({ type: 'error', text: '請輸入申請者姓名' });
                    return;
                }
                
                const trips = parseInt(bookingForm.tripCount) || 1;

                if (window.FB_SERVICES.isDemo) {
                    setAlertMsg({ type: 'success', text: '演示模式：預約已模擬提交（不會永久儲存）' });
                    return;
                }

                const { db, appId, doc, setDoc, collection, addDoc } = window.FB_SERVICES;
                const pickupQuota = currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup;
                const dropoffQuota = currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff;

                if (pickupQuota.used + trips > pickupQuota.total || dropoffQuota.used + trips > dropoffQuota.total) {
                    setAlertMsg({ type: 'error', text: `預約失敗：該時段區域配額不足（需要 ${trips} 個配額）` });
                    return;
                }

                try {
                    const quotaDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'quotas', selectedDate);
                    const updatedQuota = JSON.parse(JSON.stringify(currentQuota));
                    updatedQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.used += trips;
                    updatedQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.used += trips;
                    await setDoc(quotaDocRef, updatedQuota);

                    const bookingsCol = collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
                    await addDoc(bookingsCol, {
                        ...bookingForm,
                        tripCount: trips,
                        bookingDate: selectedDate,
                        createdAt: Date.now(),
                        userId: user.uid
                    });

                    setAlertMsg({ type: 'success', text: '預約成功！資料已同步至雲端資料庫' });
                    setBookingForm(prev => ({ ...prev, applicantName: '', purpose: PURPOSES[0], tripCount: 1 }));
                    setTimeout(() => setAlertMsg({ type: '', text: '' }), 4000);
                } catch (err) {
                    setAlertMsg({ type: 'error', text: '連線錯誤：請檢查資料庫權限設定' });
                }
            };

            // 車務部：修改配額
            const handleQuotaChange = async (region, slot, hub, field, value) => {
                if (!user || window.FB_SERVICES.isDemo) return;
                const { db, appId, doc, setDoc } = window.FB_SERVICES;
                const val = parseInt(value) || 0;
                const updatedQuota = JSON.parse(JSON.stringify(currentQuota));
                updatedQuota[region][slot][hub][field] = val;
                
                const quotaDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'quotas', selectedDate);
                await setDoc(quotaDocRef, updatedQuota);
            };

            if (loading) {
                return (
                    <div className="flex items-center justify-center h-screen bg-slate-50">
                        <div className="text-center">
                            <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="font-bold text-slate-500">系統載入中...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {window.FB_SERVICES?.isDemo && (
                        <div className="bg-red-600 text-white text-[11px] py-1.5 px-4 font-bold text-center animate-pulse sticky top-0 z-50">
                            [ 離線演示模式 ] 資料將不會儲存。請於原始碼中填寫 Firebase Config 以啟用雲端同步。
                        </div>
                    )}
                    <header className="bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center border-b-4 border-blue-600">
                        <div className="flex items-center space-x-3">
                            <Icon name="bus" className="w-8 h-8 text-blue-400" />
                            <h1 className="text-xl font-black uppercase tracking-tight">Rehabus Hub</h1>
                        </div>
                        
                        {/* 角色切換開關 */}
                        <div className="flex items-center space-x-4">
                            <div className="bg-slate-800 p-1 rounded-xl flex">
                                <button 
                                    onClick={() => setRole('cs')}
                                    className={`px-4 py-1.5 text-xs font-bold rounded-lg transition-all ${role === 'cs' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}
                                >
                                    客戶服務部
                                </button>
                                <button 
                                    onClick={() => setRole('ops')}
                                    className={`px-4 py-1.5 text-xs font-bold rounded-lg transition-all ${role === 'ops' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}
                                >
                                    車務部
                                </button>
                            </div>
                            <div className="hidden md:block text-[10px] text-slate-400 font-mono bg-slate-800 px-3 py-2 rounded-lg border border-slate-700">
                                ID: {user?.uid?.slice(0, 8) || 'CONNECTING...'}
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <aside className="space-y-4">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                {/* 根據角色顯示對應的選單 */}
                                {role === 'cs' ? (
                                    <div className="w-full flex items-center p-4 bg-blue-50 text-blue-700 border-l-4 border-blue-600 cursor-default">
                                        <Icon name="user-plus" className="w-5 h-5 mr-3" /> <span className="font-bold">新增預約申請</span>
                                    </div>
                                ) : (
                                    <div className="w-full flex items-center p-4 bg-blue-50 text-blue-700 border-l-4 border-blue-600 cursor-default">
                                        <Icon name="settings" className="w-5 h-5 mr-3" /> <span className="font-bold">配額資源樞紐</span>
                                    </div>
                                )}
                            </div>

                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                                <h3 className="text-xs font-black text-slate-400 uppercase mb-3 flex items-center tracking-widest">
                                    <Icon name="history" className="w-4 h-4 mr-2" /> 最近預約記錄 ({selectedDate})
                                </h3>
                                <div className="space-y-2 max-h-[500px] overflow-y-auto pr-1">
                                    {bookings.filter(b => b.bookingDate === selectedDate).length === 0 ? (
                                        <div className="text-center py-10">
                                            <Icon name="calendar-x" className="w-10 h-10 text-slate-200 mx-auto mb-2" />
                                            <p className="text-[10px] text-slate-400 italic">尚無當日預約資料</p>
                                        </div>
                                    ) : (
                                        bookings.filter(b => b.bookingDate === selectedDate).map(b => (
                                            <div key={b.id} className="text-[11px] p-3 bg-slate-50 rounded-xl border border-slate-100 transition-all hover:border-blue-200">
                                                <div className="flex justify-between items-start">
                                                    <span className="font-bold text-slate-800">{b.applicantName}</span>
                                                    <div>
                                                        <span className="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full font-bold scale-90">{b.purpose}</span>
                                                        <span className="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded-full font-bold scale-90 ml-1">{b.tripCount || 1} 程</span>
                                                    </div>
                                                    <div>
                                                        <span className="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full font-bold scale-90">{b.timeSlot}</span>
                                                    </div>
                                                </div>
                                                <div className="text-slate-500 mt-2 flex items-center">
                                                    <Icon name="map-pin" className="w-3 h-3 mr-1 text-slate-400" /> {b.pickupRegion} → {b.dropoffRegion}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </aside>

                        <main className="lg:col-span-3">
                            {role === 'cs' ? (
                                /* ==================== 顧客服務部視圖 ==================== */
                                <div className="space-y-6 animate-in fade-in duration-300">
                                    <div className="grid grid-cols-1 xl:grid-cols-5 gap-6">
                                        <div className="xl:col-span-3 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 space-y-6">
                                            <div className="flex justify-between items-center border-b pb-4">
                                                <h2 className="text-lg font-black text-slate-800 flex items-center tracking-tight">
                                                    <Icon name="clipboard-list" className="w-5 h-5 mr-2 text-blue-600" /> 填寫乘車申請
                                                </h2>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="col-span-2 md:col-span-1">
                                                    <label className="text-[11px] font-black text-slate-500 uppercase mb-2 block tracking-wider">乘車日期</label>
                                                    <input type="date" value={selectedDate} onChange={(e)=>setSelectedDate(e.target.value)} className="w-full p-3 border rounded-xl bg-slate-50 font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all" />
                                                </div>
                                                <div className="col-span-2 md:col-span-1">
                                                    <label className="text-[11px] font-black text-slate-500 uppercase mb-2 block tracking-wider">申請人姓名</label>
                                                    <input type="text" value={bookingForm.applicantName} onChange={(e)=>setBookingForm({...bookingForm, applicantName: e.target.value})} className="w-full p-3 border rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="輸入全名" />
                                                </div>
                                                <div className="col-span-2 md:col-span-1">
                                                    <label className="text-[11px] font-black text-blue-600 mb-2 block uppercase tracking-wider">用車目的</label>
                                                    <select value={bookingForm.purpose} onChange={(e)=>setBookingForm({...bookingForm, purpose: e.target.value})} className="w-full p-3 border border-blue-200 bg-blue-50 rounded-xl font-bold cursor-pointer hover:bg-blue-100 transition-all">
                                                        {PURPOSES.map(p => <option key={p}>{p}</option>)}
                                                    </select>
                                                </div>
                                                <div className="col-span-2 md:col-span-1">
                                                    <label className="text-[11px] font-black text-blue-600 mb-2 block uppercase tracking-wider">申請行程數目</label>
                                                    <input type="number" min="1" value={bookingForm.tripCount} onChange={(e)=>setBookingForm({...bookingForm, tripCount: parseInt(e.target.value) || 1})} className="w-full p-3 border border-blue-200 bg-blue-50 rounded-xl font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all" />
                                                </div>
                                                <div className="col-span-2">
                                                    <label className="text-[11px] font-black text-slate-500 mb-2 block uppercase tracking-wider">預約時段</label>
                                                    <select value={bookingForm.timeSlot} onChange={(e)=>setBookingForm({...bookingForm, timeSlot: e.target.value})} className="w-full p-3 border rounded-xl bg-slate-50 font-bold cursor-pointer hover:bg-slate-100 transition-all">
                                                        {TIME_SLOTS.map(s => <option key={s}>{s}</option>)}
                                                    </select>
                                                </div>
                                                <div className="col-span-2 md:col-span-1">
                                                    <label className="text-[11px] font-black text-emerald-600 mb-2 block tracking-wider uppercase">上車區域</label>
                                                    <select value={bookingForm.pickupRegion} onChange={(e)=>setBookingForm({...bookingForm, pickupRegion: e.target.value})} className="w-full p-3 border border-emerald-200 bg-emerald-50 rounded-xl font-bold cursor-pointer hover:bg-emerald-100 transition-all">
                                                        {REGIONS.map(r => <option key={r}>{r}</option>)}
                                                    </select>
                                                </div>
                                                <div className="col-span-2 md:col-span-1">
                                                    <label className="text-[11px] font-black text-orange-600 mb-2 block tracking-wider uppercase">落車區域</label>
                                                    <select value={bookingForm.dropoffRegion} onChange={(e)=>setBookingForm({...bookingForm, dropoffRegion: e.target.value})} className="w-full p-3 border border-orange-200 bg-orange-50 rounded-xl font-bold cursor-pointer hover:bg-orange-100 transition-all">
                                                        {REGIONS.map(r => <option key={r}>{r}</option>)}
                                                    </select>
                                                </div>
                                            </div>

                                            <button onClick={processBooking} disabled={!user} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-600 active:scale-[0.98] transition-all shadow-lg disabled:opacity-50">
                                                立即提交預約資料
                                            </button>

                                            {alertMsg.text && (
                                                <div className={`p-4 rounded-xl text-sm font-bold border flex items-center animate-bounce ${alertMsg.type==='error'?'bg-red-50 border-red-200 text-red-600':'bg-emerald-50 border-emerald-200 text-emerald-600'}`}>
                                                    <Icon name={alertMsg.type==='error'?'alert-circle':'check-circle'} className="mr-2" />
                                                    {alertMsg.text}
                                                </div>
                                            )}
                                        </div>

                                        <div className="xl:col-span-2">
                                            <div className="bg-slate-900 text-white p-6 rounded-3xl shadow-xl sticky top-6">
                                                <h3 className="text-xs font-black text-slate-400 uppercase mb-6 flex items-center border-b border-slate-700 pb-3 tracking-widest">
                                                    <Icon name="activity" className="w-4 h-4 mr-2" /> 即時配額檢測
                                                </h3>
                                                <div className="space-y-8">
                                                    <div>
                                                        <div className="flex justify-between mb-2 items-end">
                                                            <span className="text-xs text-emerald-400 font-bold uppercase tracking-wide">{bookingForm.pickupRegion} (上車)</span>
                                                            <span className="text-xs font-mono font-bold tracking-widest">
                                                                {currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.used} / {currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.total}
                                                            </span>
                                                        </div>
                                                        <div className="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-0.5 border border-slate-700">
                                                            <div className={`h-full rounded-full transition-all duration-1000 ${(currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.used / currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.total) >= 0.8 ? 'bg-red-500' : 'bg-emerald-500'}`} style={{width: `${Math.min(100, (currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.used/currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.total)*100)}%`}}></div>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <div className="flex justify-between mb-2 items-end">
                                                            <span className="text-xs text-orange-400 font-bold uppercase tracking-wide">{bookingForm.dropoffRegion} (落車)</span>
                                                            <span className="text-xs font-mono font-bold tracking-widest">
                                                                {currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.used} / {currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.total}
                                                            </span>
                                                        </div>
                                                        <div className="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-0.5 border border-slate-700">
                                                            <div className={`h-full rounded-full transition-all duration-1000 ${(currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.used / currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.total) >= 0.8 ? 'bg-red-500' : 'bg-orange-500'}`} style={{width: `${Math.min(100, (currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.used/currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.total)*100)}%`}}></div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="mt-8 pt-6 border-t border-slate-800">
                                                    <p className="text-[10px] text-slate-500 leading-relaxed italic">
                                                        * 客服提示：請在提交前確認配額未滿。若顏色變為紅色，代表該區配額即將或已經飽和。
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 顧客服務部全日配額概覽 */}
                                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-4 mb-6 space-y-4 md:space-y-0">
                                            <h3 className="text-lg font-black text-slate-800 flex items-center tracking-tight">
                                                <Icon name="layout-grid" className="w-5 h-5 mr-2 text-blue-600" /> 全日各分區時段配額一覽 ({selectedDate})
                                            </h3>
                                            <div className="flex space-x-4">
                                                <div className="flex items-center text-[10px] font-bold text-slate-500">
                                                    <span className="w-2.5 h-2.5 bg-emerald-500 rounded-full mr-1.5"></span> 上車 (P)
                                                </div>
                                                <div className="flex items-center text-[10px] font-bold text-slate-500">
                                                    <span className="w-2.5 h-2.5 bg-orange-500 rounded-full mr-1.5"></span> 落車 (D)
                                                </div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                            {TIME_SLOTS.map(slot => (
                                                <div key={slot} className="bg-slate-50 p-5 rounded-2xl border border-slate-100 hover:border-blue-200 transition-colors">
                                                    <h4 className="font-bold text-blue-800 text-sm mb-4 pb-2 border-b border-blue-100 flex justify-between items-center">
                                                        <span>{slot.split(' ')[0]}</span>
                                                        <span className="text-[10px] font-mono text-slate-400">{slot.split(' ')[1]}</span>
                                                    </h4>
                                                    <div className="space-y-4">
                                                        {REGIONS.map(region => {
                                                            const pData = currentQuota[region][slot].pickup;
                                                            const dData = currentQuota[region][slot].dropoff;
                                                            const pPct = (pData.used / pData.total) * 100 || 0;
                                                            const dPct = (dData.used / dData.total) * 100 || 0;
                                                            return (
                                                                <div key={region} className="group">
                                                                    <div className="flex justify-between text-[10px] font-bold text-slate-600 mb-1.5">
                                                                        <span className="group-hover:text-blue-600 transition-colors">{region}</span>
                                                                        <div className="space-x-2 font-mono">
                                                                            <span className={pPct >= 80 ? 'text-red-500' : 'text-emerald-600'}>{pData.used}/{pData.total}</span>
                                                                            <span className={dPct >= 80 ? 'text-red-500' : 'text-orange-500'}>{dData.used}/{dData.total}</span>
                                                                        </div>
                                                                    </div>
                                                                    <div className="flex space-x-1.5">
                                                                        <div className="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                                                            <div className={`h-full transition-all duration-500 ${pPct >= 80 ? 'bg-red-500' : 'bg-emerald-500'}`} style={{width: `${Math.min(100, pPct)}%`}}></div>
                                                                        </div>
                                                                        <div className="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                                                            <div className={`h-full transition-all duration-500 ${dPct >= 80 ? 'bg-red-500' : 'bg-orange-500'}`} style={{width: `${Math.min(100, dPct)}%`}}></div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-6 pt-4 border-t border-slate-100 flex items-center justify-center">
                                            <Icon name="info" className="w-3.5 h-3.5 text-blue-400 mr-2" />
                                            <span className="text-[10px] text-slate-400 font-medium">客服提示：建議客戶預約前，參考此表避開紅色滿載之區域與時段。</span>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                /* ==================== 車務部視圖 ==================== */
                                <div className="space-y-6 animate-in fade-in duration-300">
                                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 overflow-x-auto">
                                        <div className="flex justify-between items-center mb-6">
                                            <h2 className="text-xl font-black flex items-center tracking-tight">
                                                <Icon name="sliders" className="w-6 h-6 mr-2 text-blue-600" /> 配額資源配置中心
                                            </h2>
                                            <div className="flex items-center space-x-4">
                                                <button
                                                    onClick={() => setIsEditingQuota(!isEditingQuota)}
                                                    className={`flex items-center px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${isEditingQuota ? 'bg-red-500 text-white shadow-md hover:bg-red-600' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                                >
                                                    <Icon name={isEditingQuota ? "lock" : "unlock"} className="w-3.5 h-3.5 mr-1" />
                                                    {isEditingQuota ? '鎖定並儲存' : '解鎖以更改配額'}
                                                </button>
                                                <div className="flex items-center space-x-2">
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">選擇日期：</span>
                                                    <input type="date" value={selectedDate} onChange={(e)=>setSelectedDate(e.target.value)} className="p-2 border rounded-xl text-sm font-bold bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" />
                                                </div>
                                            </div>
                                        </div>
                                        <table className="w-full border-collapse min-w-[800px]">
                                            <thead>
                                                <tr className="bg-slate-50 border-b text-[10px] text-slate-400 uppercase tracking-widest">
                                                    <th className="p-4 text-left border-r w-32">服務區域</th>
                                                    {TIME_SLOTS.map(s => <th key={s} className="p-4 text-center border-r">{s.split(' ')[0]}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {REGIONS.map(region => (
                                                    <tr key={region} className="border-b hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-4 border-r font-black text-slate-700 bg-slate-50/30">{region}</td>
                                                        {TIME_SLOTS.map(slot => (
                                                            <td key={slot} className="p-4 border-r">
                                                                <div className="space-y-2">
                                                                    <div className="flex items-center space-x-2">
                                                                        <span className={`text-[9px] font-bold w-8 ${isEditingQuota ? 'text-emerald-600' : 'text-slate-400'}`}>上車</span>
                                                                        <input 
                                                                            type="number" 
                                                                            value={currentQuota[region][slot].pickup.total} 
                                                                            onChange={(e)=>handleQuotaChange(region, slot, 'pickup', 'total', e.target.value)} 
                                                                            disabled={!isEditingQuota}
                                                                            className={`w-full p-1.5 rounded-lg text-xs text-center font-bold outline-none transition-all ${isEditingQuota ? 'border border-emerald-200 focus:border-blue-500 hover:bg-white text-emerald-900' : 'bg-transparent text-slate-500 cursor-not-allowed border border-transparent'}`} 
                                                                        />
                                                                    </div>
                                                                    <div className="flex items-center space-x-2">
                                                                        <span className={`text-[9px] font-bold w-8 ${isEditingQuota ? 'text-orange-600' : 'text-slate-400'}`}>落車</span>
                                                                        <input 
                                                                            type="number" 
                                                                            value={currentQuota[region][slot].dropoff.total} 
                                                                            onChange={(e)=>handleQuotaChange(region, slot, 'dropoff', 'total', e.target.value)} 
                                                                            disabled={!isEditingQuota}
                                                                            className={`w-full p-1.5 rounded-lg text-xs text-center font-bold outline-none transition-all ${isEditingQuota ? 'border border-orange-200 focus:border-blue-500 hover:bg-white text-orange-900' : 'bg-transparent text-slate-500 cursor-not-allowed border border-transparent'}`} 
                                                                        />
                                                                    </div>
                                                                </div>
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* 全港配額實時概覽 */}
                                    <div className="bg-slate-900 p-8 rounded-3xl shadow-xl">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-slate-700 pb-6 space-y-4 md:space-y-0">
                                            <div>
                                                <h3 className="text-white font-black text-xl flex items-center tracking-tight">
                                                    <Icon name="layout-grid" className="w-7 h-7 mr-3 text-blue-400" /> 全港配額時段分佈 ({selectedDate})
                                                </h3>
                                                <p className="text-slate-500 text-[11px] mt-1 font-bold tracking-wide uppercase">即時監控各時段、各區域之運力負荷百分比</p>
                                            </div>
                                            <div className="flex bg-slate-800 p-1 rounded-xl border border-slate-700">
                                                <div className="flex items-center px-3 py-1 bg-emerald-500/10 rounded-lg mr-2 border border-emerald-500/20">
                                                    <div className="w-2.5 h-2.5 bg-emerald-500 rounded-full mr-2"></div>
                                                    <span className="text-[10px] text-emerald-400 font-black">上車負荷</span>
                                                </div>
                                                <div className="flex items-center px-3 py-1 bg-orange-500/10 rounded-lg border border-orange-500/20">
                                                    <div className="w-2.5 h-2.5 bg-orange-500 rounded-full mr-2"></div>
                                                    <span className="text-[10px] text-orange-400 font-black">落車負荷</span>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            {TIME_SLOTS.map(slot => (
                                                <div key={slot} className="bg-slate-800/40 p-6 rounded-2xl border border-slate-700/50 hover:bg-slate-800 transition-all group">
                                                    <div className="flex justify-between items-center mb-6 border-b border-slate-700/50 pb-3">
                                                        <div className="flex items-center">
                                                            <div className="p-2 bg-blue-500/20 rounded-lg mr-3">
                                                                <Icon name={slot.includes('繁忙') ? 'zap' : 'clock'} className="w-4 h-4 text-blue-400" />
                                                            </div>
                                                            <span className="text-white font-black text-md">{slot.split(' ')[0]}</span>
                                                        </div>
                                                        <span className="text-[10px] font-mono text-slate-500 bg-slate-900 px-2 py-1 rounded-md border border-slate-700 tracking-tighter">{slot.split(' ')[1]}</span>
                                                    </div>

                                                    <div className="space-y-6">
                                                        {REGIONS.map(region => {
                                                            const pData = currentQuota[region][slot].pickup;
                                                            const dData = currentQuota[region][slot].dropoff;
                                                            const pPct = (pData.used / pData.total) * 100 || 0;
                                                            const dPct = (dData.used / dData.total) * 100 || 0;

                                                            return (
                                                                <div key={region} className="group/item">
                                                                    <div className="flex justify-between items-end mb-2">
                                                                        <span className="text-slate-400 font-bold text-xs group-hover/item:text-blue-400 transition-colors">{region}</span>
                                                                        <div className="flex space-x-3 text-[9px] font-mono font-bold tracking-tight">
                                                                            <span className={pPct >= 80 ? 'text-red-400' : 'text-emerald-500'}>P: {pData.used}/{pData.total}</span>
                                                                            <span className={dPct >= 80 ? 'text-red-400' : 'text-orange-500'}>D: {dData.used}/{dData.total}</span>
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    <div className="flex flex-col space-y-1">
                                                                        {/* 上車進度條 */}
                                                                        <div className="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden border border-slate-800">
                                                                            <div 
                                                                                className={`h-full transition-all duration-1000 ${pPct >= 80 ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]' : 'bg-emerald-500'}`} 
                                                                                style={{width: `${Math.min(100, pPct)}%`}}
                                                                            ></div>
                                                                        </div>
                                                                        {/* 落車進度條 */}
                                                                        <div className="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden border border-slate-800">
                                                                            <div 
                                                                                className={`h-full transition-all duration-1000 ${dPct >= 80 ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]' : 'bg-orange-500'}`} 
                                                                                style={{width: `${Math.min(100, dPct)}%`}}
                                                                            ></div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <div className="mt-8 flex flex-wrap gap-4 justify-center items-center pt-6 border-t border-slate-800">
                                            <div className="flex items-center px-4 py-2 bg-slate-800 rounded-full border border-slate-700">
                                                <div className="w-2 h-2 bg-red-500 rounded-full mr-2 shadow-[0_0_5px_rgba(239,68,68,0.8)] animate-pulse"></div>
                                                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">紅色：負荷超過 80%</span>
                                            </div>
                                            <div className="flex items-center px-4 py-2 bg-slate-800 rounded-full border border-slate-700">
                                                <Icon name="info" className="w-3.5 h-3.5 text-blue-400 mr-2" />
                                                <span className="text-[10px] text-slate-400 font-medium">數據為所選時段內各區上車與落車之即時雲端統計</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
