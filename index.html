<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復康巴士資源樞紐系統 - Rehabus Hub (Cloud Storage)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === FIREBASE 配置區塊 ===
        const manualConfig = {
            apiKey: "AIzaSyDyq0hFze7k8lGOM74DrEUHd2lMuiRLfKE",
            authDomain: "rehabus-hub.firebaseapp.com",
            projectId: "rehabus-hub",
            storageBucket: "rehabus-hub.firebasestorage.app",
            messagingSenderId: "177803133313",
            appId: "1:177803133313:web:f7f660932ebfc070142880"
        };

        let firebaseConfig = null;
        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            } else if (manualConfig.apiKey !== "YOUR_API_KEY") {
                firebaseConfig = manualConfig;
            }
        } catch (e) {
            console.error("Config parsing error", e);
        }

        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'rehabus-hub-global';

            window.FB_SERVICES = { 
                db, auth, appId, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, 
                signInAnonymously, onAuthStateChanged, signInWithCustomToken,
                isDemo: false
            };
        } else {
            window.FB_SERVICES = { 
                isDemo: true,
                onAuthStateChanged: (auth, callback) => callback({ uid: 'OFFLINE-USER-' + Math.random().toString(36).substr(2, 9) })
            };
        }
    </script>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    if (className) iconElement.className = className;
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({ attrs: { class: className } });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const REGIONS = ['香港島', '九龍東', '九龍西', '新界東', '新界西'];
        const TIME_SLOTS = ['上午繁忙時間 (06:00-10:59)', '中段 (11:00-14:59)', '下午繁忙時間 (15:00-19:59)', '晚上 (20:00-23:59)'];
        const PURPOSES = ['就診/治療', '上班/上學', '康復訓練', '社交/娛樂', '日常購物', '其他'];

        const generateDefaultQuota = () => {
            const quota = {};
            REGIONS.forEach(region => {
                quota[region] = {};
                TIME_SLOTS.forEach(slot => {
                    quota[region][slot] = {
                        pickup: { total: 12, used: 0 },
                        dropoff: { total: 12, used: 0 }
                    };
                });
            });
            return quota;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('process');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [quotasData, setQuotasData] = useState({});
            const [bookings, setBookings] = useState([]);
            const [alertMsg, setAlertMsg] = useState({ type: '', text: '' });
            const [loading, setLoading] = useState(true);

            const [bookingForm, setBookingForm] = useState({
                applicantName: '',
                purpose: PURPOSES[0],
                pickupRegion: REGIONS[0],
                dropoffRegion: REGIONS[1],
                timeSlot: TIME_SLOTS[0],
            });

            useEffect(() => {
                const services = window.FB_SERVICES;
                if (!services) return;

                if (services.isDemo) {
                    setUser({ uid: 'DEMO-MODE' });
                    setQuotasData({ [selectedDate]: generateDefaultQuota() });
                    setLoading(false);
                    return;
                }

                const { auth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = services;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { console.error("Auth error:", err); }
                };

                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (user) => setUser(user));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || window.FB_SERVICES?.isDemo) return;
                const { db, appId, collection, doc, onSnapshot, setDoc } = window.FB_SERVICES;

                const bookingsCol = collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
                const unsubBookings = onSnapshot(bookingsCol, (snapshot) => {
                    const list = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                    setBookings(list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
                }, (err) => console.error("Bookings load error:", err));

                const quotaDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'quotas', selectedDate);
                const unsubQuotas = onSnapshot(quotaDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setQuotasData(prev => ({ ...prev, [selectedDate]: docSnap.data() }));
                    } else {
                        const defaultData = generateDefaultQuota();
                        setDoc(quotaDocRef, defaultData);
                        setQuotasData(prev => ({ ...prev, [selectedDate]: defaultData }));
                    }
                    setLoading(false);
                }, (err) => console.error("Quota load error:", err));

                return () => { unsubBookings(); unsubQuotas(); };
            }, [user, selectedDate]);

            const currentQuota = quotasData[selectedDate] || generateDefaultQuota();

            const processBooking = async () => {
                if (!user) return;
                if (!bookingForm.applicantName.trim()) {
                    setAlertMsg({ type: 'error', text: '請輸入申請者姓名' });
                    return;
                }

                if (window.FB_SERVICES.isDemo) {
                    setAlertMsg({ type: 'success', text: '演示模式：預約已模擬提交（不會永久儲存）' });
                    return;
                }

                const { db, appId, doc, setDoc, collection, addDoc } = window.FB_SERVICES;
                const pickupQuota = currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup;
                const dropoffQuota = currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff;

                if (pickupQuota.used >= pickupQuota.total || dropoffQuota.used >= dropoffQuota.total) {
                    setAlertMsg({ type: 'error', text: '預約失敗：該時段區域配額已滿' });
                    return;
                }

                try {
                    const quotaDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'quotas', selectedDate);
                    const updatedQuota = JSON.parse(JSON.stringify(currentQuota));
                    updatedQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.used += 1;
                    updatedQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.used += 1;
                    await setDoc(quotaDocRef, updatedQuota);

                    const bookingsCol = collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
                    await addDoc(bookingsCol, {
                        ...bookingForm,
                        bookingDate: selectedDate,
                        createdAt: Date.now(),
                        userId: user.uid
                    });

                    setAlertMsg({ type: 'success', text: '預約成功！資料已同步至雲端資料庫' });
                    setBookingForm(prev => ({ ...prev, applicantName: '', purpose: PURPOSES[0] }));
                    setTimeout(() => setAlertMsg({ type: '', text: '' }), 4000);
                } catch (err) {
                    setAlertMsg({ type: 'error', text: '連線錯誤：請檢查資料庫權限設定' });
                }
            };

            const handleQuotaChange = async (region, slot, hub, field, value) => {
                if (!user || window.FB_SERVICES.isDemo) return;
                const { db, appId, doc, setDoc } = window.FB_SERVICES;
                const val = parseInt(value) || 0;
                const updatedQuota = JSON.parse(JSON.stringify(currentQuota));
                updatedQuota[region][slot][hub][field] = val;
                
                const quotaDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'quotas', selectedDate);
                await setDoc(quotaDocRef, updatedQuota);
            };

            return (
                <div className="min-h-screen">
                    {window.FB_SERVICES?.isDemo && (
                        <div className="bg-red-600 text-white text-[11px] py-1.5 px-4 font-bold text-center animate-pulse">
                            [ 離線演示模式 ] 資料將不會儲存。請於 index.html 填寫 Firebase Config 以啟用雲端同步。
                        </div>
                    )}
                    <header className="bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center border-b-4 border-blue-600">
                        <div className="flex items-center space-x-3">
                            <Icon name="bus" className="w-8 h-8 text-blue-400" />
                            <h1 className="text-xl font-black uppercase tracking-tight">Rehabus Hub | 雲端管理系統</h1>
                        </div>
                        <div className="hidden md:block text-[10px] text-slate-400 font-mono bg-slate-800 px-3 py-1 rounded-full">
                            ID: {user?.uid || 'CONNECTING...'}
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <aside className="space-y-4">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <button onClick={()=>setActiveTab('process')} className={`w-full flex items-center p-4 transition ${activeTab==='process'?'bg-blue-600 text-white':'text-slate-600 hover:bg-slate-50'}`}>
                                    <Icon name="user-plus" className="w-5 h-5 mr-3" /> <span className="font-bold">新增預約申請</span>
                                </button>
                                <button onClick={()=>setActiveTab('manage')} className={`w-full flex items-center p-4 transition ${activeTab==='manage'?'bg-blue-600 text-white':'text-slate-600 hover:bg-slate-50'}`}>
                                    <Icon name="settings" className="w-5 h-5 mr-3" /> <span className="font-bold">配額樞紐設定</span>
                                </button>
                            </div>

                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                                <h3 className="text-xs font-black text-slate-400 uppercase mb-3 flex items-center tracking-widest">
                                    <Icon name="history" className="w-4 h-4 mr-2" /> 最近預約記錄 ({selectedDate})
                                </h3>
                                <div className="space-y-2 max-h-[500px] overflow-y-auto pr-1">
                                    {bookings.filter(b => b.bookingDate === selectedDate).length === 0 ? (
                                        <div className="text-center py-10">
                                            <Icon name="calendar-x" className="w-10 h-10 text-slate-200 mx-auto mb-2" />
                                            <p className="text-[10px] text-slate-400 italic">尚無預約資料</p>
                                        </div>
                                    ) : (
                                        bookings.filter(b => b.bookingDate === selectedDate).map(b => (
                                            <div key={b.id} className="text-[11px] p-3 bg-slate-50 rounded-xl border border-slate-100 transition-all hover:border-blue-200">
                                                <div className="flex justify-between items-start">
                                                    <span className="font-bold text-slate-800">{b.applicantName}</span>
                                                    <span className="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full font-bold scale-90">{b.purpose}</span>
                                                </div>
                                                <div className="text-slate-500 mt-2 flex items-center">
                                                    <Icon name="map-pin" className="w-3 h-3 mr-1" /> {b.pickupRegion} → {b.dropoffRegion}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </aside>

                        <main className="lg:col-span-3">
                            {activeTab === 'process' ? (
                                <div className="grid grid-cols-1 xl:grid-cols-5 gap-6">
                                    <div className="xl:col-span-3 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 space-y-6">
                                        <div className="flex justify-between items-center border-b pb-4">
                                            <h2 className="text-lg font-black text-slate-800 flex items-center tracking-tight">
                                                <Icon name="clipboard-list" className="w-5 h-5 mr-2 text-blue-600" /> 填寫乘車申請
                                            </h2>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="text-[11px] font-black text-slate-500 uppercase mb-2 block tracking-wider">乘車日期</label>
                                                <input type="date" value={selectedDate} onChange={(e)=>setSelectedDate(e.target.value)} className="w-full p-3 border rounded-xl bg-slate-50 font-bold focus:ring-2 focus:ring-blue-500 outline-none" />
                                            </div>
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="text-[11px] font-black text-slate-500 uppercase mb-2 block tracking-wider">申請人姓名</label>
                                                <input type="text" value={bookingForm.applicantName} onChange={(e)=>setBookingForm({...bookingForm, applicantName: e.target.value})} className="w-full p-3 border rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入全名" />
                                            </div>
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="text-[11px] font-black text-blue-600 mb-2 block">用車目的</label>
                                                <select value={bookingForm.purpose} onChange={(e)=>setBookingForm({...bookingForm, purpose: e.target.value})} className="w-full p-3 border border-blue-200 bg-blue-50 rounded-xl font-bold cursor-pointer">
                                                    {PURPOSES.map(p => <option key={p}>{p}</option>)}
                                                </select>
                                            </div>
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="text-[11px] font-black text-slate-500 mb-2 block">預約時段</label>
                                                <select value={bookingForm.timeSlot} onChange={(e)=>setBookingForm({...bookingForm, timeSlot: e.target.value})} className="w-full p-3 border rounded-xl bg-slate-50 font-bold cursor-pointer">
                                                    {TIME_SLOTS.map(s => <option key={s}>{s}</option>)}
                                                </select>
                                            </div>
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="text-[11px] font-black text-emerald-600 mb-2 block tracking-wider">上車區域</label>
                                                <select value={bookingForm.pickupRegion} onChange={(e)=>setBookingForm({...bookingForm, pickupRegion: e.target.value})} className="w-full p-3 border border-emerald-200 bg-emerald-50 rounded-xl font-bold cursor-pointer">
                                                    {REGIONS.map(r => <option key={r}>{r}</option>)}
                                                </select>
                                            </div>
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="text-[11px] font-black text-orange-600 mb-2 block tracking-wider">落車區域</label>
                                                <select value={bookingForm.dropoffRegion} onChange={(e)=>setBookingForm({...bookingForm, dropoffRegion: e.target.value})} className="w-full p-3 border border-orange-200 bg-orange-50 rounded-xl font-bold cursor-pointer">
                                                    {REGIONS.map(r => <option key={r}>{r}</option>)}
                                                </select>
                                            </div>
                                        </div>

                                        <button onClick={processBooking} disabled={!user} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-600 active:scale-[0.98] transition-all shadow-lg disabled:opacity-50">
                                            立即提交預約資料
                                        </button>

                                        {alertMsg.text && (
                                            <div className={`p-4 rounded-xl text-sm font-bold border flex items-center animate-bounce ${alertMsg.type==='error'?'bg-red-50 border-red-200 text-red-600':'bg-emerald-50 border-emerald-200 text-emerald-600'}`}>
                                                <Icon name={alertMsg.type==='error'?'alert-circle':'check-circle'} className="mr-2" />
                                                {alertMsg.text}
                                            </div>
                                        )}
                                    </div>

                                    <div className="xl:col-span-2">
                                        <div className="bg-slate-900 text-white p-6 rounded-3xl shadow-xl sticky top-6">
                                            <h3 className="text-xs font-black text-slate-400 uppercase mb-6 flex items-center border-b border-slate-700 pb-3">
                                                <Icon name="activity" className="w-4 h-4 mr-2" /> 即時負荷監視
                                            </h3>
                                            <div className="space-y-8">
                                                <div>
                                                    <div className="flex justify-between mb-2">
                                                        <span className="text-xs text-emerald-400 font-bold uppercase">{bookingForm.pickupRegion} (上車)</span>
                                                        <span className="text-xs font-mono font-bold tracking-widest">
                                                            {currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.used} / {currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.total}
                                                        </span>
                                                    </div>
                                                    <div className="w-full bg-slate-800 h-3 rounded-full overflow-hidden">
                                                        <div className="h-full bg-emerald-500 transition-all duration-500" style={{width: `${(currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.used/currentQuota[bookingForm.pickupRegion][bookingForm.timeSlot].pickup.total)*100}%`}}></div>
                                                    </div>
                                                </div>
                                                <div>
                                                    <div className="flex justify-between mb-2">
                                                        <span className="text-xs text-orange-400 font-bold uppercase">{bookingForm.dropoffRegion} (落車)</span>
                                                        <span className="text-xs font-mono font-bold tracking-widest">
                                                            {currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.used} / {currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.total}
                                                        </span>
                                                    </div>
                                                    <div className="w-full bg-slate-800 h-3 rounded-full overflow-hidden">
                                                        <div className="h-full bg-orange-500 transition-all duration-500" style={{width: `${(currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.used/currentQuota[bookingForm.dropoffRegion][bookingForm.timeSlot].dropoff.total)*100}%`}}></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="mt-8 pt-6 border-t border-slate-800">
                                                <p className="text-[10px] text-slate-500 leading-relaxed italic">
                                                    * 配額由資源樞紐即時計算，若區域負荷過高，系統將自動暫停接受該區申請。
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 overflow-x-auto">
                                        <div className="flex justify-between items-center mb-6">
                                            <h2 className="text-xl font-black flex items-center tracking-tight">
                                                <Icon name="sliders" className="w-6 h-6 mr-2 text-blue-600" /> 配額資源配置中心
                                            </h2>
                                            <input type="date" value={selectedDate} onChange={(e)=>setSelectedDate(e.target.value)} className="p-2 border rounded-xl text-sm font-bold bg-slate-50" />
                                        </div>
                                        <table className="w-full border-collapse min-w-[800px]">
                                            <thead>
                                                <tr className="bg-slate-50 border-b text-[10px] text-slate-400 uppercase tracking-widest">
                                                    <th className="p-4 text-left border-r w-32">服務區域</th>
                                                    {TIME_SLOTS.map(s => <th key={s} className="p-4 text-center border-r">{s.split(' ')[0]}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {REGIONS.map(region => (
                                                    <tr key={region} className="border-b hover:bg-slate-50 transition-colors">
                                                        <td className="p-4 border-r font-black text-slate-700 bg-slate-50/50">{region}</td>
                                                        {TIME_SLOTS.map(slot => (
                                                            <td key={slot} className="p-4 border-r">
                                                                <div className="space-y-2">
                                                                    <div className="flex items-center space-x-2">
                                                                        <span className="text-[9px] font-bold text-emerald-600 w-8">上車</span>
                                                                        <input type="number" value={currentQuota[region][slot].pickup.total} onChange={(e)=>handleQuotaChange(region, slot, 'pickup', 'total', e.target.value)} className="w-full p-1.5 border rounded-lg text-xs text-center font-bold focus:border-blue-500 outline-none" />
                                                                    </div>
                                                                    <div className="flex items-center space-x-2">
                                                                        <span className="text-[9px] font-bold text-orange-600 w-8">落車</span>
                                                                        <input type="number" value={currentQuota[region][slot].dropoff.total} onChange={(e)=>handleQuotaChange(region, slot, 'dropoff', 'total', e.target.value)} className="w-full p-1.5 border rounded-lg text-xs text-center font-bold focus:border-blue-500 outline-none" />
                                                                    </div>
                                                                </div>
                                                            </td>
                                                        ))}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* 新增：全港配額實時概覽 */}
                                    <div className="bg-slate-900 p-8 rounded-3xl shadow-xl">
                                        <div className="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
                                            <h3 className="text-white font-black text-lg flex items-center tracking-tight">
                                                <Icon name="bar-chart-3" className="w-6 h-6 mr-3 text-blue-400" /> 全港配額實時概覽 ({selectedDate})
                                            </h3>
                                            <div className="flex items-center space-x-4">
                                                <div className="flex items-center"><div className="w-3 h-3 bg-emerald-500 rounded-full mr-2"></div><span className="text-[10px] text-slate-400 font-bold">上車配額</span></div>
                                                <div className="flex items-center"><div className="w-3 h-3 bg-orange-500 rounded-full mr-2"></div><span className="text-[10px] text-slate-400 font-bold">落車配額</span></div>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                            {REGIONS.map(region => {
                                                // 計算該區域全日的總配額與已用配額
                                                let totalPickup = 0, usedPickup = 0, totalDropoff = 0, usedDropoff = 0;
                                                TIME_SLOTS.forEach(slot => {
                                                    totalPickup += currentQuota[region][slot].pickup.total;
                                                    usedPickup += currentQuota[region][slot].pickup.used;
                                                    totalDropoff += currentQuota[region][slot].dropoff.total;
                                                    usedDropoff += currentQuota[region][slot].dropoff.used;
                                                });

                                                const pickupPercent = (usedPickup / totalPickup) * 100 || 0;
                                                const dropoffPercent = (usedDropoff / totalDropoff) * 100 || 0;

                                                return (
                                                    <div key={region} className="bg-slate-800 p-5 rounded-2xl border border-slate-700 hover:border-blue-500 transition-all group">
                                                        <div className="flex justify-between items-center mb-4">
                                                            <span className="text-white font-black text-md">{region}</span>
                                                            <div className="flex flex-col items-end">
                                                                <span className="text-[10px] text-slate-400 font-mono tracking-tighter">全日總配額狀態</span>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="space-y-4">
                                                            <div>
                                                                <div className="flex justify-between text-[10px] mb-1.5">
                                                                    <span className="text-emerald-400 font-bold uppercase">上車</span>
                                                                    <span className="text-slate-300 font-mono">{usedPickup} / {totalPickup}</span>
                                                                </div>
                                                                <div className="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden">
                                                                    <div 
                                                                        className={`h-full transition-all duration-1000 ${pickupPercent > 80 ? 'bg-red-500' : pickupPercent > 50 ? 'bg-yellow-500' : 'bg-emerald-500'}`} 
                                                                        style={{width: `${pickupPercent}%`}}
                                                                    ></div>
                                                                </div>
                                                            </div>

                                                            <div>
                                                                <div className="flex justify-between text-[10px] mb-1.5">
                                                                    <span className="text-orange-400 font-bold uppercase">落車</span>
                                                                    <span className="text-slate-300 font-mono">{usedDropoff} / {totalDropoff}</span>
                                                                </div>
                                                                <div className="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden">
                                                                    <div 
                                                                        className={`h-full transition-all duration-1000 ${dropoffPercent > 80 ? 'bg-red-500' : dropoffPercent > 50 ? 'bg-yellow-500' : 'bg-orange-500'}`} 
                                                                        style={{width: `${dropoffPercent}%`}}
                                                                    ></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="mt-4 pt-3 border-t border-slate-700 flex justify-center">
                                                            <span className={`text-[9px] font-black px-3 py-1 rounded-full ${pickupPercent > 80 || dropoffPercent > 80 ? 'bg-red-900/40 text-red-400' : 'bg-slate-700 text-slate-400'}`}>
                                                                {pickupPercent > 80 || dropoffPercent > 80 ? '負荷接近飽和' : '資源運作正常'}
                                                            </span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
